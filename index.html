<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="./assets/img/Character/lvl_3/Idle/0_Dark_Oracle_Idle_000.png">
  <title>Louan</title>

  <link rel="stylesheet" href="./style/font-style.css">
  <link rel="stylesheet" href="./style/base.css">
  <link rel="stylesheet" href="./style/start-screen.css">
  <link rel="stylesheet" href="./style/canvas.css">
  <link rel="stylesheet" href="./style/dialogs.css">
  <link rel="stylesheet" href="./style/mobil.css">

  <script type="module" src="./js/game.js"></script>
</head>

<body class="intro-mode">

  <div id="transitionOverlay"></div>

  <h1>Louan der Krieger</h1>
  <p id="introPrompt">Drücke eine beliebige Taste</p>
  <button type="button" id="introStartButton" aria-label="Start">Start</button>
  <div id="startScreenOrientationPrompt" aria-live="polite" aria-hidden="true">
    <p>Drehen Sie das Handy</p>
  </div>

  <canvas id="startScreenCanvas" width="720" height="480"></canvas>

  <div id="gameCanvasShell">
    <div id="gameCanvasOverlay" aria-label="Spielmenue und Audio">
      <button type="button" id="gameMenuButton" class="gameCanvasButton" aria-label="Menue">☰</button>
      <button type="button" id="gameMusicToggleButton" class="gameCanvasButton" data-music-toggle aria-pressed="false" aria-label="Musik stummschalten">♪</button>
    </div>
    <div id="mobileOrientationOverlay" aria-live="polite" aria-hidden="true">
      <p>Drehen <br> Sie das <br> Handy</p>
    </div>
    <section id="mobileControls" aria-label="Steuerung">
      <button type="button" id="mobileLeftButton" class="mobileControlButton" aria-label="Links bewegen">←</button>
      <button type="button" id="mobileRightButton" class="mobileControlButton" aria-label="Rechts bewegen">→</button>
      <button type="button" id="mobileJumpButton" class="mobileControlButton" aria-label="Springen">↑</button>
      <button type="button" id="mobileRunningButton" class="mobileControlButton" aria-label="running">🏃</button>
      <button type="button" id="mobileThrowButton" class="mobileControlButton" aria-label="Waffe werfen">●</button>
      <button type="button" id="mobileMenuButton" class="mobileControlButton" aria-label="Menue">☰</button>
      <button type="button" id="mobileMusicToggleButton" class="mobileControlButton" data-music-toggle aria-pressed="false" aria-label="Musik stummschalten">♪</button>
    </section>
    <canvas id="gameCanvas" width="720" height="480"></canvas>
  </div>

</body>

</html>
